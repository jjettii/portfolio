<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordan Ettinger - Video Production</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="sidebar">
        <a href="index.html" class="logo">
            <img src="assets/img/logo.png" alt="Jordan Ettinger">
        </a>

        <ul class="nav-links">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="reel.html" class="nav-link">Reel</a></li>
            <li><a href="about.html" class="nav-link">About</a></li>
            <li><a href="contact.html" class="nav-link">Contact</a></li>
        </ul>
    </nav>

    <main class="content">
        <div class="intro">
            <h1>Jordan Ettinger</h1>
            <p></p> <!--Sub heading-->
        </div>

        <div class="video-grid">
                <!-- Video Item 1 - Havn -->
                <div class="video-item" data-video-id="havn">
                    <img src="assets/img/HAVN.webp" alt="Havn" class="video-poster">
                    <video class="video-preview" muted loop preload="none">
                        <source src="assets/mp4/HAVN.mp4" type="video/mp4">
                    </video>
                    <div class="video-overlay">
                        <h3>HAVN Saunas</h3>
                    </div>
                </div>

                <!-- Video Item 2 - Lightwater Cove -->
                <div class="video-item" data-video-id="lightwater-cove">
                    <img src="assets/img/Lightwater.webp" alt="Lightwater Cove" class="video-poster">
                    <video class="video-preview" muted loop preload="none">
                        <source src="assets/mp4/LightwaterCove.mp4" type="video/mp4">
                    </video>
                    <div class="video-overlay">
                        <h3>Lightwater Cove</h3>
                    </div>
                </div>

                <!-- Video Item 3 - Inside The Leather -->
                <div class="video-item" data-video-id="itl">
                    <img src="assets/img/ITL.webp" alt="Inside The Leather" class="video-poster">
                    <video class="video-preview" muted loop preload="none">
                        <source src="assets/mp4/ITL.mp4" type="video/mp4">
                    </video>
                    <div class="video-overlay">
                        <h3>Inside The Leather</h3>
                    </div>
                </div>

                <!-- Video Item 4 - Camp Brand Goods - Edible Underwear -->
                <div class="video-item" data-video-id="edible-underwear">
                    <img src="assets/img/EdibleUnderwear.webp" alt="Camp Brand Goods - Edible Underwear" class="video-poster">
                    <video class="video-preview" muted loop preload="none">
                        <source src="assets/mp4/EdibleUnderwear.mp4" type="video/mp4">
                    </video>
                    <div class="video-overlay">
                        <h3>Camp Brand Goods - Edible Underwear</h3>
                    </div>
                </div>

                <!-- Video Item 5 - Bracelayer -->
                <div class="video-item" data-video-id="bracelayer">
                    <img src="assets/img/Bracelayer.webp" alt="Bracelayer" class="video-poster">
                    <video class="video-preview" muted loop preload="none">
                        <source src="assets/mp4/Bracelayer.mp4" type="video/mp4">
                    </video>
                    <div class="video-overlay">
                        <h3>Bracelayer</h3>
                    </div>
                </div>

                <!-- Video Item 6 - San Poncho -->
                <div class="video-item" data-video-id="san-poncho">
                    <img src="assets/img/SanPoncho.webp" alt="San Poncho" class="video-poster">
                    <video class="video-preview" muted loop preload="none">
                        <source src="assets/mp4/SanPoncho.mp4" type="video/mp4">
                    </video>
                    <div class="video-overlay">
                        <h3>San Poncho</h3>
                    </div>
                </div>

        </div>
    </main>

    <script src="assets/js/main.js"></script>

</html>
