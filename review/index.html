<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Video Projects — Jordan Ettinger</title>
  <link rel="icon" type="image/png" href="/assets/favicon/favicon-96x96.png" sizes="96x96">
  <link rel="stylesheet" href="/assets/css/style.css">
  <script src="https://embed.cloudflarestream.com/embed/sdk.latest.js"></script>
  <style>
    body { background: #fff; }

    /* ── Layout ── */
    .rv-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 40px;
      border-bottom: 1px solid #e0e0e0;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 50;
    }
    .rv-logo img { height: 20px; width: auto; display: block; }
    .rv-header-actions { display: flex; gap: 10px; align-items: center; }

    /* ── Buttons ── */
    .rv-btn {
      padding: 9px 20px;
      background: #000;
      color: #fff;
      border: none;
      font-family: 'AkzidenzGrotesk', sans-serif;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .rv-btn:hover { opacity: 0.75; }
    .rv-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .rv-btn-ghost {
      background: transparent;
      color: #000;
      border: 1px solid #ccc;
    }
    .rv-btn-ghost:hover { border-color: #000; }
    .rv-btn-sm { padding: 6px 14px; font-size: 10px; }
    .rv-btn-danger { background: #c00; }

    /* ── Panels ── */
    .rv-panel { display: none; }
    .rv-panel.active { display: block; }

    /* ── Gate panel ── */
    .rv-gate-wrap {
      max-width: 440px;
      margin: 0 auto;
      padding: 80px 24px;
    }
    .rv-gate-heading {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .rv-gate-sub {
      font-size: 14px;
      font-weight: 300;
      color: #666;
      margin-bottom: 40px;
    }

    /* ── Admin dashboard panel ── */
    .rv-admin-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 40px;
    }
    .rv-admin-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }
    .rv-admin-heading {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .rv-review-list { margin-top: 8px; }
    .rv-review-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0;
      border-bottom: 1px solid #e0e0e0;
      gap: 16px;
    }
    .rv-review-info { flex: 1; min-width: 0; }
    .rv-review-name {
      font-size: 15px;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rv-review-meta { font-size: 12px; font-weight: 300; color: #888; margin-top: 3px; }
    .rv-review-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* ── Session panel (video grid) ── */
    .rv-session-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 40px;
    }
    .rv-session-nav {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 32px;
    }
    .rv-session-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .rv-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }
    .rv-thumb {
      cursor: pointer;
      border: 1px solid #e0e0e0;
      transition: border-color 0.2s;
    }
    .rv-thumb:hover { border-color: #000; }
    .rv-thumb-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      background: #111;
    }
    .rv-thumb-body { padding: 14px; }
    .rv-thumb-title {
      font-size: 14px;
      font-weight: 400;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rv-thumb-meta { font-size: 12px; font-weight: 300; color: #888; }
    .rv-thumb-desc { font-size: 12px; font-weight: 300; color: #666; margin-top: 4px; }
    .rv-empty {
      text-align: center;
      padding: 80px 0;
      color: #aaa;
      font-size: 14px;
      font-weight: 300;
      grid-column: 1 / -1;
    }

    /* ── Player panel ── */
    .rv-player-wrap {
      display: flex;
      height: calc(100vh - 73px);
      overflow: hidden;
    }
    .rv-player-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .rv-player-top {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
      border-bottom: 1px solid #e0e0e0;
    }
    .rv-back-btn {
      background: none;
      border: none;
      font-family: 'AkzidenzGrotesk', sans-serif;
      font-size: 12px;
      font-weight: 300;
      color: #888;
      cursor: pointer;
      padding: 0;
      letter-spacing: 0.5px;
      transition: color 0.2s;
    }
    .rv-back-btn:hover { color: #000; }
    .rv-player-title {
      font-size: 15px;
      font-weight: 400;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rv-player-frame {
      flex: 1;
      position: relative;
      background: #000;
    }
    .rv-player-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .rv-player-controls {
      padding: 12px 24px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .rv-timecode {
      font-size: 13px;
      font-weight: 300;
      color: #666;
      font-variant-numeric: tabular-nums;
      min-width: 72px;
    }

    /* ── Comments sidebar ── */
    .rv-sidebar {
      width: 320px;
      flex-shrink: 0;
      border-left: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .rv-sidebar-head {
      padding: 16px 20px;
      border-bottom: 1px solid #e0e0e0;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .rv-comment-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .rv-comment {
      padding: 12px 20px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.15s;
    }
    .rv-comment:hover { background: #fafafa; }
    .rv-comment.active { background: #f5f5f5; }
    .rv-comment-ts {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 4px;
      display: inline-block;
      background: #eee;
      padding: 2px 6px;
    }
    .rv-comment-author {
      font-size: 12px;
      font-weight: 400;
      color: #000;
      margin-bottom: 3px;
    }
    .rv-comment-body {
      font-size: 13px;
      font-weight: 300;
      color: #333;
      line-height: 1.5;
    }
    .rv-comment-delete {
      display: none;
      background: none;
      border: none;
      font-family: 'AkzidenzGrotesk', sans-serif;
      font-size: 11px;
      color: #aaa;
      cursor: pointer;
      padding: 0;
      margin-top: 6px;
      transition: color 0.2s;
    }
    .rv-comment-delete:hover { color: #c00; }
    .rv-comment-form {
      border-top: 1px solid #e0e0e0;
      padding: 16px 20px;
    }
    .rv-comment-form textarea {
      width: 100%;
      height: 72px;
      padding: 10px 12px;
      border: 1px solid #ccc;
      font-family: 'AkzidenzGrotesk', sans-serif;
      font-size: 13px;
      font-weight: 300;
      resize: none;
      transition: border-color 0.2s;
      margin-bottom: 8px;
    }
    .rv-comment-form textarea:focus { outline: none; border-color: #000; }
    .rv-comment-form-row {
      display: flex;
      gap: 8px;
    }
    .rv-comment-form-row input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #ccc;
      font-family: 'AkzidenzGrotesk', sans-serif;
      font-size: 12px;
      font-weight: 300;
      transition: border-color 0.2s;
    }
    .rv-comment-form-row input:focus { outline: none; border-color: #000; }
    .rv-comment-at {
      font-size: 11px;
      font-weight: 300;
      color: #888;
      margin-bottom: 6px;
    }

    /* ── Shared form styles ── */
    .rv-field { margin-bottom: 18px; }
    .rv-label {
      display: block;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    .rv-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      font-family: 'AkzidenzGrotesk', sans-serif;
      font-size: 14px;
      font-weight: 300;
      transition: border-color 0.2s;
    }
    .rv-input:focus { outline: none; border-color: #000; }
    .rv-error {
      color: #c00;
      font-size: 13px;
      font-weight: 300;
      margin-top: 8px;
      display: none;
    }
    .rv-notice { font-size: 13px; font-weight: 300; color: #888; }

    /* ── Modals ── */
    .rv-modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .rv-modal-bg.open { display: flex; }
    .rv-modal {
      background: #fff;
      width: 100%;
      max-width: 520px;
      padding: 40px;
      margin: 20px;
    }
    .rv-modal h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
    }
    .rv-modal-actions { display: flex; gap: 12px; margin-top: 24px; }
    .rv-modal-note { font-size: 12px; font-weight: 300; color: #888; margin-top: 6px; display: none; }

    /* Upload progress */
    .rv-upload-progress { margin-top: 16px; display: none; }
    .rv-upload-bar-wrap { height: 3px; background: #eee; margin-bottom: 6px; }
    .rv-upload-bar { height: 3px; background: #000; width: 0%; transition: width 0.3s; }
    .rv-upload-label { font-size: 12px; font-weight: 300; color: #666; }

    /* Admin auth overlay */
    .rv-auth-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.95);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    .rv-auth-bg.open { display: flex; }
    .rv-auth-box { width: 100%; max-width: 360px; padding: 20px; }
    .rv-auth-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

    @media (max-width: 768px) {
      .rv-header { padding: 18px 20px; }
      .rv-gate-wrap { padding: 60px 20px; }
      .rv-admin-wrap { padding: 32px 20px; }
      .rv-session-wrap { padding: 32px 20px; }
      .rv-review-actions { flex-wrap: wrap; }
      .rv-player-wrap { flex-direction: column; height: auto; }
      .rv-sidebar { width: 100%; border-left: none; border-top: 1px solid #e0e0e0; height: 50vh; }
      .rv-player-frame { aspect-ratio: 16/9; position: relative; height: auto; flex: none; }
      .rv-player-frame iframe { position: static; height: 100%; }
      .rv-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ═══ HEADER ═══════════════════════════════════════════════════════════════ -->
<header class="rv-header">
  <a class="rv-logo" href="/">
    <img src="/assets/img/logo.webp" alt="Jordan Ettinger">
  </a>
  <div class="rv-header-actions" id="headerActions">
    <button class="rv-btn rv-btn-ghost rv-btn-sm" onclick="openAdminAuth()">Admin</button>
  </div>
</header>

<!-- ═══ GATE PANEL ══════════════════════════════════════════════════════════ -->
<div class="rv-panel active" id="panelGate">
  <div class="rv-gate-wrap">
    <h1 class="rv-gate-heading">Video Projects</h1>
    <p class="rv-gate-sub">Enter your project ID and password to access your videos.</p>

    <div class="rv-field">
      <label class="rv-label" for="gateId">Project ID</label>
      <input class="rv-input" type="text" id="gateId" placeholder="e.g. 3f2a7b1c-…"
             autocomplete="off" spellcheck="false">
    </div>
    <div class="rv-field">
      <label class="rv-label" for="gatePass">Password</label>
      <input class="rv-input" type="password" id="gatePass" placeholder="Password"
             autocomplete="off" onkeydown="if(event.key==='Enter')accessReview()">
      <div class="rv-error" id="gateError"></div>
    </div>
    <button class="rv-btn" id="gateBtn" onclick="accessReview()" style="width:100%">Access Project</button>
  </div>
</div>

<!-- ═══ ADMIN PANEL ══════════════════════════════════════════════════════════ -->
<div class="rv-panel" id="panelAdmin">
  <div class="rv-admin-wrap">
    <div class="rv-admin-head">
      <h1 class="rv-admin-heading">Projects</h1>
      <button class="rv-btn rv-btn-sm" onclick="openNewReviewModal()">+ New Project</button>
    </div>
    <div class="rv-review-list" id="reviewList">
      <p class="rv-notice">Loading…</p>
    </div>
  </div>
</div>

<!-- ═══ SESSION PANEL (video grid) ══════════════════════════════════════════ -->
<div class="rv-panel" id="panelSession">
  <div class="rv-session-wrap">
    <div class="rv-session-nav">
      <button class="rv-back-btn" id="sessionBackBtn" onclick="backFromSession()">← All Projects</button>
      <h1 class="rv-session-title" id="sessionTitle"></h1>
    </div>
    <div class="rv-grid" id="videoGrid">
      <p class="rv-notice" style="grid-column:1/-1">Loading…</p>
    </div>
  </div>
</div>

<!-- ═══ PLAYER PANEL ════════════════════════════════════════════════════════ -->
<div class="rv-panel" id="panelPlayer">
  <div class="rv-player-wrap">

    <div class="rv-player-main">
      <div class="rv-player-top">
        <button class="rv-back-btn" onclick="backToSession()">← All videos</button>
        <div class="rv-player-title" id="playerTitle"></div>
        <div id="adminVideoActions" style="display:none; gap:8px;">
          <button class="rv-btn rv-btn-sm rv-btn-ghost" onclick="openEditVideoModal()">Edit</button>
          <button class="rv-btn rv-btn-sm rv-btn-danger" onclick="deleteCurrentVideo()">Delete video</button>
        </div>
      </div>

      <div class="rv-player-frame">
        <iframe id="streamPlayer" allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;"
                allowfullscreen></iframe>
      </div>

      <div class="rv-player-controls">
        <span class="rv-timecode" id="timecode">0:00</span>
      </div>
    </div>

    <div class="rv-sidebar">
      <div class="rv-sidebar-head">Comments</div>
      <div class="rv-comment-list" id="commentList">
        <p class="rv-notice" style="padding:20px">Loading…</p>
      </div>
      <div class="rv-comment-form">
        <div class="rv-comment-at" id="commentAt">At 0:00</div>
        <textarea id="commentText" placeholder="Leave a note…"></textarea>
        <div class="rv-comment-form-row">
          <input type="text" id="commentAuthor" placeholder="Your name">
          <button class="rv-btn rv-btn-sm" onclick="submitComment()">Post</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ═══ NEW / EDIT REVIEW MODAL ══════════════════════════════════════════════ -->
<div class="rv-modal-bg" id="reviewModal">
  <div class="rv-modal">
    <h2 id="reviewModalTitle">New Review</h2>
    <div class="rv-field">
      <label class="rv-label" for="reviewName">Project Name</label>
      <input class="rv-input" type="text" id="reviewName" placeholder="e.g. Havn Saunas — Round 1"
             onkeydown="if(event.key==='Enter')saveReview()">
    </div>
    <div class="rv-field">
      <label class="rv-label" id="reviewPassLabel" for="reviewPass">Client Password</label>
      <input class="rv-input" type="text" id="reviewPass" placeholder="Password you'll share with the client"
             autocomplete="off" onkeydown="if(event.key==='Enter')saveReview()">
      <p class="rv-modal-note" id="reviewPassNote">Leave blank to keep the current password.</p>
    </div>
    <div class="rv-error" id="reviewModalErr"></div>
    <div class="rv-modal-actions">
      <button class="rv-btn" id="reviewModalSaveBtn" onclick="saveReview()">Save</button>
      <button class="rv-btn rv-btn-ghost" onclick="closeReviewModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- ═══ UPLOAD MODAL ════════════════════════════════════════════════════════ -->
<div class="rv-modal-bg" id="uploadModal">
  <div class="rv-modal">
    <h2>Upload Video</h2>

    <div class="rv-field">
      <label class="rv-label" for="upTitle">Video Title</label>
      <input class="rv-input" type="text" id="upTitle" placeholder="e.g. Havn Saunas — Rough Cut v2">
    </div>
    <div class="rv-field">
      <label class="rv-label" for="upDescription">Description (optional)</label>
      <input class="rv-input" type="text" id="upDescription" placeholder="Notes for the client">
    </div>
    <div class="rv-field">
      <label class="rv-label" for="upVideoFile">Video File</label>
      <input class="rv-input" type="file" id="upVideoFile" accept="video/*" style="padding:8px 12px">
    </div>

    <div class="rv-upload-progress" id="modalProgress">
      <div class="rv-upload-bar-wrap">
        <div class="rv-upload-bar" id="modalBar"></div>
      </div>
      <div class="rv-upload-label" id="modalLabel">Uploading…</div>
    </div>
    <div class="rv-error" id="modalErr"></div>

    <div class="rv-modal-actions">
      <button class="rv-btn" id="modalUploadBtn" onclick="doStreamUpload()">Upload</button>
      <button class="rv-btn rv-btn-ghost" onclick="closeUploadModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- ═══ EDIT VIDEO MODAL ════════════════════════════════════════════════════ -->
<div class="rv-modal-bg" id="editVideoModal">
  <div class="rv-modal">
    <h2>Edit Video</h2>
    <div class="rv-field">
      <label class="rv-label" for="editVideoTitle">Title</label>
      <input class="rv-input" type="text" id="editVideoTitle"
             onkeydown="if(event.key==='Enter')saveVideoEdit()">
    </div>
    <div class="rv-field">
      <label class="rv-label" for="editVideoDesc">Description (optional)</label>
      <input class="rv-input" type="text" id="editVideoDesc" placeholder="Notes for the client">
    </div>
    <div class="rv-error" id="editVideoErr"></div>
    <div class="rv-modal-actions">
      <button class="rv-btn" id="editVideoSaveBtn" onclick="saveVideoEdit()">Save</button>
      <button class="rv-btn rv-btn-ghost" onclick="closeEditVideoModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- ═══ ADMIN AUTH OVERLAY ══════════════════════════════════════════════════ -->
<div class="rv-auth-bg" id="adminAuthBg">
  <div class="rv-auth-box">
    <h2>Admin Sign In</h2>
    <div class="rv-field">
      <label class="rv-label" for="authPass">Admin Password</label>
      <input class="rv-input" type="password" id="authPass" placeholder="Password"
             onkeydown="if(event.key==='Enter')authLogin()">
      <div class="rv-error" id="authErr"></div>
    </div>
    <div class="rv-modal-actions">
      <button class="rv-btn" onclick="authLogin()">Sign In</button>
      <button class="rv-btn rv-btn-ghost" onclick="closeAdminAuth()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const WORKER_URL = 'https://portfolio-worker.jordanettinger.workers.dev';

// ─── State ───────────────────────────────────────────────────────────────────
let adminToken = null;
let currentSession = null;   // { id, name }
let sessionPassword = null;  // client's password for the current session
let isAdminSession = false;  // true when admin opened session (no password required)
let currentVideo = null;     // { stream_uid, title, description }
let currentTime = 0;
let streamPlayer = null;
let commentsCache = [];
let editingReviewId = null;

// ─── Panel management ─────────────────────────────────────────────────────────
function showPanel(name) {
  document.querySelectorAll('.rv-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel' + name).classList.add('active');
  updateHeader(name);
}

function updateHeader(panel) {
  const ha = document.getElementById('headerActions');
  if (!adminToken) {
    ha.innerHTML = `<button class="rv-btn rv-btn-ghost rv-btn-sm" onclick="openAdminAuth()">Admin</button>`;
    return;
  }
  const signOut = `<button class="rv-btn rv-btn-ghost rv-btn-sm" onclick="adminLogout()">Sign out</button>`;
  if (panel === 'Admin') {
    ha.innerHTML = signOut;
  } else if (panel === 'Session') {
    ha.innerHTML = `
      <button class="rv-btn rv-btn-sm" onclick="openUploadModal()">+ Upload Video</button>
      <button class="rv-btn rv-btn-ghost rv-btn-sm" onclick="goToAdmin()">All Projects</button>
      ${signOut}
    `;
  } else {
    ha.innerHTML = signOut;
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
(function init() {
  const id = new URLSearchParams(location.search).get('id');
  if (id) {
    document.getElementById('gateId').value = id;
    setTimeout(() => document.getElementById('gatePass').focus(), 100);
  }
  showPanel('Gate');

})();

// ─── Gate ─────────────────────────────────────────────────────────────────────
async function accessReview() {
  const id = document.getElementById('gateId').value.trim();
  const pass = document.getElementById('gatePass').value;
  const errEl = document.getElementById('gateError');
  const btn = document.getElementById('gateBtn');

  errEl.style.display = 'none';
  if (!id || !pass) { showErr(errEl, 'Enter both fields.'); return; }

  btn.disabled = true;
  btn.textContent = 'Checking…';

  try {
    const resp = await fetch(
      `${WORKER_URL}/api/review/${encodeURIComponent(id)}?password=${encodeURIComponent(pass)}`
    );
    const data = await resp.json();

    if (!resp.ok) { showErr(errEl, data.error || 'Invalid ID or password.'); return; }

    currentSession = { id: data.id, name: data.name };
    sessionPassword = pass;
    isAdminSession = false;
    history.pushState(null, '', `?id=${id}`);
    await loadSessionVideos();
    showPanel('Session');
    document.getElementById('sessionBackBtn').style.display = 'none';
  } catch {
    showErr(errEl, 'Network error. Try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Access Project';
  }
}

// ─── Admin Auth ───────────────────────────────────────────────────────────────
function openAdminAuth() {
  document.getElementById('adminAuthBg').classList.add('open');
  document.getElementById('authPass').value = '';
  document.getElementById('authErr').style.display = 'none';
  setTimeout(() => document.getElementById('authPass').focus(), 100);
}
function closeAdminAuth() {
  document.getElementById('adminAuthBg').classList.remove('open');
}

async function authLogin() {
  const pass = document.getElementById('authPass').value;
  const errEl = document.getElementById('authErr');
  errEl.style.display = 'none';

  const resp = await fetch(`${WORKER_URL}/api/reviews`, {
    headers: { Authorization: `Bearer ${pass}` },
  });

  if (!resp.ok) {
    errEl.textContent = 'Incorrect password.';
    errEl.style.display = 'block';
    return;
  }

  adminToken = pass;
  closeAdminAuth();
  renderAdminReviewList(await resp.json());
  showPanel('Admin');
}

function adminLogout() {
  adminToken = null;
  currentSession = null;
  sessionPassword = null;
  isAdminSession = false;
  history.pushState(null, '', location.pathname);
  document.getElementById('gateId').value = '';
  document.getElementById('gatePass').value = '';
  showPanel('Gate');
}

// ─── Admin Panel ──────────────────────────────────────────────────────────────
async function goToAdmin() {
  const resp = await fetch(`${WORKER_URL}/api/reviews`, {
    headers: { Authorization: `Bearer ${adminToken}` },
  });
  if (resp.ok) renderAdminReviewList(await resp.json());
  showPanel('Admin');
}

function renderAdminReviewList(sessions) {
  const el = document.getElementById('reviewList');
  if (!sessions.length) {
    el.innerHTML = '<p class="rv-notice" style="padding:24px 0">No projects yet. Create one to get started.</p>';
    return;
  }
  el.innerHTML = sessions.map(s => `
    <div class="rv-review-item">
      <div class="rv-review-info">
        <div class="rv-review-name">${esc(s.name)}</div>
        <div class="rv-review-meta">
          ${s.video_count} video${s.video_count !== 1 ? 's' : ''}
          · ${new Date(s.created_at).toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' })}
        </div>
      </div>
      <div class="rv-review-actions">
        <button class="rv-btn rv-btn-sm rv-btn-ghost"
                onclick="copyReviewLink('${esc(s.id)}', this)">Copy link</button>
        <button class="rv-btn rv-btn-sm"
                onclick="adminOpenSession('${esc(s.id)}', '${esc(s.name)}')">Open</button>
        <button class="rv-btn rv-btn-sm rv-btn-ghost"
                onclick="openEditReviewModal('${esc(s.id)}', '${esc(s.name)}')">Edit</button>
        <button class="rv-btn rv-btn-sm rv-btn-danger"
                onclick="deleteReview('${esc(s.id)}', '${esc(s.name)}')">Delete</button>
      </div>
    </div>
  `).join('');
}

function copyReviewLink(id, btn) {
  const url = location.origin + '/review/?id=' + id;
  navigator.clipboard.writeText(url).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  });
  const prev = btn.textContent;
  btn.textContent = 'Copied!';
  setTimeout(() => { btn.textContent = prev; }, 2000);
}

async function adminOpenSession(id, name) {
  currentSession = { id, name };
  isAdminSession = true;
  sessionPassword = null;
  history.pushState(null, '', `?id=${id}`);
  await loadSessionVideos();
  document.getElementById('sessionBackBtn').style.display = 'inline';
  showPanel('Session');
}

async function deleteReview(id, name) {
  if (!confirm(`Delete project "${name}"?\nThis will permanently delete all videos and comments.`)) return;
  const resp = await fetch(`${WORKER_URL}/api/review/${encodeURIComponent(id)}`, {
    method: 'DELETE',
    headers: { Authorization: `Bearer ${adminToken}` },
  });
  if (resp.ok) goToAdmin();
  else alert('Delete failed.');
}

// ─── New / Edit Review Modal ──────────────────────────────────────────────────
function openNewReviewModal() {
  editingReviewId = null;
  document.getElementById('reviewModalTitle').textContent = 'New Project';
  document.getElementById('reviewName').value = '';
  document.getElementById('reviewPass').value = '';
  document.getElementById('reviewPassLabel').textContent = 'Client Password';
  document.getElementById('reviewPassNote').style.display = 'none';
  document.getElementById('reviewModalErr').style.display = 'none';
  document.getElementById('reviewModalSaveBtn').textContent = 'Save';
  document.getElementById('reviewModal').classList.add('open');
  setTimeout(() => document.getElementById('reviewName').focus(), 100);
}

function openEditReviewModal(id, name) {
  editingReviewId = id;
  document.getElementById('reviewModalTitle').textContent = 'Edit Project';
  document.getElementById('reviewName').value = name;
  document.getElementById('reviewPass').value = '';
  document.getElementById('reviewPassLabel').textContent = 'New Password';
  document.getElementById('reviewPassNote').style.display = 'block';
  document.getElementById('reviewModalErr').style.display = 'none';
  document.getElementById('reviewModalSaveBtn').textContent = 'Save';
  document.getElementById('reviewModal').classList.add('open');
  setTimeout(() => document.getElementById('reviewName').focus(), 100);
}

function closeReviewModal() {
  document.getElementById('reviewModal').classList.remove('open');
}

async function saveReview() {
  const name = document.getElementById('reviewName').value.trim();
  const pass = document.getElementById('reviewPass').value.trim();
  const errEl = document.getElementById('reviewModalErr');
  const btn = document.getElementById('reviewModalSaveBtn');
  errEl.style.display = 'none';

  if (!name) { showErr(errEl, 'Enter a project name.'); return; }
  if (!editingReviewId && !pass) { showErr(errEl, 'Enter a client password.'); return; }

  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    let resp;
    if (editingReviewId) {
      const body = { name };
      if (pass) body.password = pass;
      resp = await fetch(`${WORKER_URL}/api/review/${encodeURIComponent(editingReviewId)}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
        body: JSON.stringify(body),
      });
    } else {
      resp = await fetch(`${WORKER_URL}/api/review/create`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
        body: JSON.stringify({ name, password: pass }),
      });
    }

    if (!resp.ok) {
      const d = await resp.json();
      showErr(errEl, d.error || 'Something went wrong.');
      return;
    }

    closeReviewModal();
    await goToAdmin();
  } catch {
    showErr(errEl, 'Network error.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save';
  }
}

// ─── Session (video grid) ─────────────────────────────────────────────────────
async function loadSessionVideos() {
  document.getElementById('sessionTitle').textContent = currentSession.name;
  const grid = document.getElementById('videoGrid');
  grid.innerHTML = '<p class="rv-notice" style="grid-column:1/-1">Loading…</p>';

  try {
    const url = isAdminSession
      ? `${WORKER_URL}/api/review/${encodeURIComponent(currentSession.id)}/videos`
      : `${WORKER_URL}/api/review/${encodeURIComponent(currentSession.id)}/videos?password=${encodeURIComponent(sessionPassword)}`;
    const headers = isAdminSession ? { Authorization: `Bearer ${adminToken}` } : {};
    const resp = await fetch(url, { headers });
    const videos = await resp.json();
    renderVideoGrid(videos);
  } catch {
    grid.innerHTML = '<p class="rv-notice" style="grid-column:1/-1">Could not load videos.</p>';
  }
}

function renderVideoGrid(videos) {
  const grid = document.getElementById('videoGrid');

  if (!videos.length) {
    grid.innerHTML = `<p class="rv-empty">${isAdminSession ? 'No videos yet. Upload one to get started.' : 'No videos yet.'}</p>`;
    return;
  }

  grid.innerHTML = videos.map(v => `
    <div class="rv-thumb"
         data-uid="${esc(v.stream_uid)}"
         data-title="${esc(v.title)}"
         data-desc="${esc(v.description || '')}">
      <img class="rv-thumb-img"
           src="https://videodelivery.net/${esc(v.stream_uid)}/thumbnails/thumbnail.jpg?time=2s&width=640"
           alt="${esc(v.title)}"
           onerror="this.style.background='#111'">
      <div class="rv-thumb-body">
        <div class="rv-thumb-title">${esc(v.title)}</div>
        <div class="rv-thumb-meta">${new Date(v.created_at).toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' })}</div>
        ${v.description ? `<div class="rv-thumb-desc">${esc(v.description)}</div>` : ''}
        ${adminToken ? `<button class="rv-btn rv-btn-sm rv-btn-danger" style="margin-top:10px;width:100%" onclick="deleteSessionVideo(event,'${esc(v.stream_uid)}','${esc(v.title)}')">Delete</button>` : ''}
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.rv-thumb').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.tagName === 'BUTTON') return;
      openVideo(el.dataset.uid, el.dataset.title, el.dataset.desc);
    });
  });
}

async function deleteSessionVideo(e, uid, title) {
  e.stopPropagation();
  if (!confirm(`Delete "${title}"? This is permanent.`)) return;
  const resp = await fetch(`${WORKER_URL}/api/stream/${encodeURIComponent(uid)}`, {
    method: 'DELETE',
    headers: { Authorization: `Bearer ${adminToken}` },
  });
  if (resp.ok) await loadSessionVideos();
  else alert('Delete failed.');
}

function backFromSession() {
  history.pushState(null, '', location.pathname);
  if (adminToken) {
    goToAdmin();
  } else {
    currentSession = null;
    sessionPassword = null;
    showPanel('Gate');
  }
}

// ─── Player ───────────────────────────────────────────────────────────────────
function openVideo(uid, title, description) {
  currentVideo = { stream_uid: uid, title, description };
  currentTime = 0;
  streamPlayer = null;

  document.getElementById('playerTitle').textContent = title;
  document.getElementById('timecode').textContent = '0:00';
  document.getElementById('commentAt').textContent = 'At 0:00';
  document.getElementById('commentText').value = '';
  document.getElementById('adminVideoActions').style.display = adminToken ? 'flex' : 'none';

  const iframe = document.getElementById('streamPlayer');
  iframe.src = `https://iframe.cloudflarestream.com/${uid}?preload=auto&loop=false`;
  iframe.onload = function () {
    streamPlayer = Stream(iframe);
    streamPlayer.muted = false;
    streamPlayer.addEventListener('timeupdate', function () {
      currentTime = streamPlayer.currentTime;
      document.getElementById('timecode').textContent = formatTime(currentTime);
      document.getElementById('commentAt').textContent = 'At ' + formatTime(currentTime);
    });
  };

  loadComments(uid);
  showPanel('Player');
}

function backToSession() {
  streamPlayer = null;
  document.getElementById('streamPlayer').src = '';
  showPanel('Session');
}

function openEditVideoModal() {
  if (!currentVideo) return;
  document.getElementById('editVideoTitle').value = currentVideo.title;
  document.getElementById('editVideoDesc').value = currentVideo.description || '';
  document.getElementById('editVideoErr').style.display = 'none';
  document.getElementById('editVideoSaveBtn').textContent = 'Save';
  document.getElementById('editVideoModal').classList.add('open');
  setTimeout(() => document.getElementById('editVideoTitle').focus(), 100);
}

function closeEditVideoModal() {
  document.getElementById('editVideoModal').classList.remove('open');
}

async function saveVideoEdit() {
  const title = document.getElementById('editVideoTitle').value.trim();
  const description = document.getElementById('editVideoDesc').value.trim();
  const errEl = document.getElementById('editVideoErr');
  const btn = document.getElementById('editVideoSaveBtn');

  errEl.style.display = 'none';
  if (!title) { showErr(errEl, 'Title is required.'); return; }

  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    const resp = await fetch(`${WORKER_URL}/api/stream/${encodeURIComponent(currentVideo.stream_uid)}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
      body: JSON.stringify({ title, description }),
    });

    if (!resp.ok) {
      const d = await resp.json();
      showErr(errEl, d.error || 'Save failed.');
      return;
    }

    currentVideo.title = title;
    currentVideo.description = description;
    document.getElementById('playerTitle').textContent = title;
    closeEditVideoModal();
  } catch {
    showErr(errEl, 'Network error.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save';
  }
}

async function deleteCurrentVideo() {
  if (!currentVideo) return;
  if (!confirm(`Delete "${currentVideo.title}"? This is permanent.`)) return;

  const resp = await fetch(`${WORKER_URL}/api/stream/${encodeURIComponent(currentVideo.stream_uid)}`, {
    method: 'DELETE',
    headers: { Authorization: `Bearer ${adminToken}` },
  });

  if (resp.ok) {
    document.getElementById('streamPlayer').src = '';
    await loadSessionVideos();
    showPanel('Session');
  } else {
    alert('Delete failed.');
  }
}

// ─── Comments ─────────────────────────────────────────────────────────────────
async function loadComments(videoId) {
  const list = document.getElementById('commentList');
  list.innerHTML = '<p class="rv-notice" style="padding:20px">Loading…</p>';

  try {
    const resp = await fetch(`${WORKER_URL}/api/comments/${encodeURIComponent(videoId)}`);
    commentsCache = await resp.json();
    renderComments();
  } catch {
    list.innerHTML = '<p class="rv-notice" style="padding:20px">Could not load comments.</p>';
  }
}

function renderComments() {
  const list = document.getElementById('commentList');
  if (!commentsCache.length) {
    list.innerHTML = '<p class="rv-notice" style="padding:20px">No comments yet. Be the first.</p>';
    return;
  }

  list.innerHTML = commentsCache.map(c => `
    <div class="rv-comment" id="comment-${c.id}" onclick="seekTo(${c.timestamp_seconds})">
      <span class="rv-comment-ts">${formatTime(c.timestamp_seconds)}</span>
      <div class="rv-comment-author">${esc(c.author)}</div>
      <div class="rv-comment-body">${esc(c.body)}</div>
      ${adminToken ? `<button class="rv-comment-delete" onclick="deleteComment(event,${c.id})">Delete</button>` : ''}
    </div>
  `).join('');

  if (adminToken) {
    list.querySelectorAll('.rv-comment-delete').forEach(b => b.style.display = 'block');
  }
}

async function submitComment() {
  const text = document.getElementById('commentText').value.trim();
  const author = document.getElementById('commentAuthor').value.trim() || 'Anonymous';

  if (!text || !currentVideo) return;

  const resp = await fetch(`${WORKER_URL}/api/comments`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      video_id: currentVideo.stream_uid,
      timestamp_seconds: currentTime,
      author,
      text,
    }),
  });

  if (resp.ok) {
    document.getElementById('commentText').value = '';
    await loadComments(currentVideo.stream_uid);
    const data = await resp.json().catch(() => ({}));
    if (data.id) {
      const el = document.getElementById(`comment-${data.id}`);
      if (el) el.scrollIntoView({ behavior: 'smooth' });
    }
  }
}

async function deleteComment(e, id) {
  e.stopPropagation();
  if (!confirm('Delete this comment?')) return;

  const resp = await fetch(`${WORKER_URL}/api/comments/${id}`, {
    method: 'DELETE',
    headers: { Authorization: `Bearer ${adminToken}` },
  });

  if (resp.ok && currentVideo) await loadComments(currentVideo.stream_uid);
}

function seekTo(seconds) {
  if (streamPlayer) {
    streamPlayer.currentTime = seconds;
  }
  currentTime = seconds;
  document.getElementById('timecode').textContent = formatTime(seconds);
  document.getElementById('commentAt').textContent = 'At ' + formatTime(seconds);
}

// ─── Upload Modal ─────────────────────────────────────────────────────────────
function openUploadModal() {
  if (!currentSession) return;
  document.getElementById('uploadModal').classList.add('open');
  document.getElementById('modalErr').style.display = 'none';
  document.getElementById('modalProgress').style.display = 'none';
  document.getElementById('modalBar').style.width = '0%';
  document.getElementById('upTitle').value = '';
  document.getElementById('upDescription').value = '';
  document.getElementById('upVideoFile').value = '';
}
function closeUploadModal() {
  document.getElementById('uploadModal').classList.remove('open');
}

async function doStreamUpload() {
  const title = document.getElementById('upTitle').value.trim();
  const description = document.getElementById('upDescription').value.trim();
  const file = document.getElementById('upVideoFile').files[0];
  const errEl = document.getElementById('modalErr');
  const btn = document.getElementById('modalUploadBtn');

  errEl.style.display = 'none';
  if (!title) { showErr(errEl, 'Enter a title.'); return; }
  if (!file) { showErr(errEl, 'Choose a video file.'); return; }

  btn.disabled = true;
  btn.textContent = 'Starting…';

  try {
    const resp = await fetch(`${WORKER_URL}/api/stream/upload`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
      body: JSON.stringify({ title, description, review_id: currentSession.id }),
    });

    if (!resp.ok) {
      const d = await resp.json();
      showErr(errEl, d.error || 'Could not start upload.');
      return;
    }

    const { uploadUrl } = await resp.json();
    const progressWrap = document.getElementById('modalProgress');
    const bar = document.getElementById('modalBar');
    const label = document.getElementById('modalLabel');
    progressWrap.style.display = 'block';
    btn.textContent = 'Uploading…';

    await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', uploadUrl);
      // Use FormData (multipart/form-data) — avoids CORS preflight that blocks raw binary uploads
      const formData = new FormData();
      formData.append('file', file);
      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          bar.style.width = pct + '%';
          label.textContent = `Uploading… ${pct}%`;
        }
      };
      xhr.onload = () => xhr.status >= 200 && xhr.status < 300
        ? resolve()
        : reject(new Error(`Upload returned HTTP ${xhr.status}`));
      xhr.onerror = () => reject(new Error('Network error during upload'));
      xhr.send(formData);
    });

    label.textContent = 'Upload complete — processing may take a few minutes.';
    btn.textContent = 'Done';
    setTimeout(async () => {
      closeUploadModal();
      await loadSessionVideos();
    }, 2000);

  } catch (err) {
    showErr(errEl, 'Upload failed: ' + err.message);
  } finally {
    btn.disabled = false;
    if (btn.textContent !== 'Done') btn.textContent = 'Upload';
  }
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function showErr(el, msg) {
  el.textContent = msg;
  el.style.display = 'block';
}

function formatTime(secs) {
  const s = Math.floor(secs);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  const ss = String(s % 60).padStart(2, '0');
  const mm = String(m % 60).padStart(2, '0');
  return h > 0 ? `${h}:${mm}:${ss}` : `${m}:${ss}`;
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
