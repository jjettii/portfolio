<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Jordan Ettinger</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="sidebar">
        <a href="home.html" class="logo">
            <img src="assets/img/logo.webp" alt="Jordan Ettinger">
        </a>

        <ul class="nav-links">
            <li class="nav-home"><a href="home.html" class="nav-link">Home</a></li>
            <li><a href="reel.html" class="nav-link">Reel</a></li>
            <li><a href="about.html" class="nav-link">About</a></li>
            <li><a href="contact.html" class="nav-link">Contact</a></li>
        </ul>
    </nav>

    <main class="content">
        <div class="contact-section">
            <h1>Get In Touch</h1>
            <p>For inquiries, contact mail@jordanettinger.com or use the contact form below.</p>
            <br>
            <form class="contact-form" action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="8d079e92-7b30-4c12-ab0c-d18a26d48dbc">

                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" required></textarea>
                </div>

                <button type="submit">Send Message</button>
            </form>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
</body>
</html>
